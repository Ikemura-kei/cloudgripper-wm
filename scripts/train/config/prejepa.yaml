defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: cloudgripper_${backbone.type}
subdir: null
seed: 42

# --- Data ---
dataset_name: ???   # required: pass as dataset_name=/abs/path/to/collect.lance
n_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
frameskip: 1        # no temporal skip — robot data is already at action frequency

batch_size: 32
num_workers: 4
train_split: 0.9

# --- Backbone ---
backbone:
  name: dinov2_small
  type: dinov2_small
  is_video_encoder: false
  interpolate_pos_encoding: true

image_size: 224
patch_size: 14      # must match backbone patch size (14 for dinov2)

# --- World model ---
wm:
  history_size: 3
  num_preds: 1
  encoding:
    action: 10      # 5-dim delta [Δx, Δy, Δz, Δrot, Δgrip] → embedded to 10-dim
    state: 10       # 5-dim commanded target → embedded to 10-dim

# --- Predictor ---
predictor:
  size: small
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

# --- Model ---
model:
  _target_: stable_worldmodel.wm.PreJEPA
  history_size: ${wm.history_size}
  num_pred: ${wm.num_preds}
  interpolate_pos_encoding: ${backbone.interpolate_pos_encoding}
  encoder:
    _target_: stable_worldmodel.wm.prejepa.module.create_backbone
    name: ${backbone.name}
  predictor:
    _target_: stable_worldmodel.wm.prejepa.module.CausalPredictor
    num_patches: ???
    num_frames: ${wm.history_size}
    dim: ???
    depth: ${predictor.depth}
    heads: ${predictor.heads}
    mlp_dim: ${predictor.mlp_dim}
    dim_head: ${predictor.dim_head}
    dropout: ${predictor.dropout}
    emb_dropout: ${predictor.emb_dropout}

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 5e-4
  weight_decay: 0.0

# --- Scheduler ---
scheduler:
  type: CosineAnnealingLR
  T_max: ${trainer.max_epochs}

# --- Trainer ---
trainer:
  max_epochs: 100
  strategy: auto
  devices: auto
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 1.0
