defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: false

# --- Output ---
# Folder that will contain {name}.lance and config.yaml
output: data/cloudgripper
output_name: cloudgripper

# --- Robots ---
robots:
  - robot25
use_mock: false

# --- World ---
world:
  image_shape: [180, 320]
  max_episode_steps: 60
  dwell_time: 0.05
  reset_dwell_time: 0.1
  max_delta: 0.125
  show_display: false
  dof_wise: true
  use_cur_state: true
  use_ws: false

# --- Collection ---
episodes: 80
seed: 427

# --- Policy ---
policy:
  _target_: cloudgripper_wm.policies.WarmupRandomPolicy
  n_warmup: 3
