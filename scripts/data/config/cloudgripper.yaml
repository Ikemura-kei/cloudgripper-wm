defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: false

# --- Output ---
output: data/cloudgripper.lance
output_name: cloudgripper

# --- Robots ---
robots:
  - robot23
use_mock: false

# --- World ---
world:
  image_shape: [180, 320]
  max_episode_steps: 70
  dwell_time: 0.025
  max_delta: 0.15

# --- Collection ---
episodes: 80
seed: 427

# --- Policy ---
policy:
  _target_: stable_worldmodel.policy.RandomPolicy
