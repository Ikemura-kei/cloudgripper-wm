defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: false

# --- Output ---
# Folder that will contain {name}.lance and config.yaml
output: data/cloudgripper
output_name: cloudgripper

# --- Robots ---
robots:
  - robot23
use_mock: false

# --- World ---
world:
  image_shape: [180, 320]
  max_episode_steps: 10
  dwell_time: 0.05
  reset_dwell_time: 2.0
  max_delta: 0.15
  show_display: false
  dof_wise: false
  use_cur_state: true
  use_ws: false

# --- Collection ---
episodes: 80
seed: 427

# --- Policy ---
policy:
  _target_: stable_worldmodel.policy.RandomPolicy
