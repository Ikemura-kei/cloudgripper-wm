defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: false

# --- Output ---
# Folder that will contain {name}.lance and config.yaml
output: data/cloudgripper_safe_nogrip
output_name: cloudgripper_safe_nogrip

# --- Robots ---
# Safety filter requires per-robot camera calibration (currently only robot23).
robots:
  - robot23
use_mock: false

# --- World ---
world:
  image_shape: [180, 320]
  max_episode_steps: 60
  dwell_time: 0.075
  reset_dwell_time: 0.1
  max_delta: 0.125
  show_display: false
  dof_wise: true
  use_cur_state: true
  use_ws: false

# --- Safety (collision-avoidance wrapper) ---
safety:
  cell_size: 0.006

# --- Collection ---
episodes: 1000
seed: 427

# --- Policy ---
policy:
  _target_: cloudgripper_wm.policies.NoGripRandomPolicy
