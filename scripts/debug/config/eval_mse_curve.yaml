defaults:
  - _self_

# Path to weights_epoch_N.pt (absolute, or relative to ~/.stable-worldmodel/checkpoints/)
checkpoint: ???

# Path to dataset (.lance / .h5 / folder)
dataset: ???

eval:
  n_pred_steps: 20   # autoregressive steps beyond context
  n_episodes: -1     # episode windows to average over; set to -1 to use all available
  image_size: 224
  frameskip: 1  # overridden automatically — inferred from model.action_encoder.input_dim
  keys_to_load:
    - pixels
    - action
    # - proprio  # add for TwoRoom / models trained with proprioception conditioning
    # - state    # add for CloudGripper / models trained with state conditioning

output:
  path: mse_curve.png   # set to null to show interactively instead of saving
